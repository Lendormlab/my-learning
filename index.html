<!DOCTYPE html>
<html>
<head>
  <title>Leandrom's Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #f0f6ff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 48px;
    }
    h1 {
      font-size: 36px;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #888888;
      margin-bottom: 36px;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary {
      background-color: #1a73e8;
      color: #ffffff;
    }
    .btn-secondary {
      background-color: #ffffff;
      color: #1a73e8;
      border: 1px solid #dce8ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hi, I'm Leandrom</h1>
    <p>但行好事，莫问前程</p>
    <div class="links">
      <a href="/profile.html" class="btn btn-primary">关于我</a>
      <a href="https://github.com/Lendormlab" class="btn btn-secondary">GitHub</a>
    </div>
  </div>
</body>
</html>
