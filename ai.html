<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI 对话</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0f0f0f;
      color: #ececec;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 { font-size: 22px; margin-bottom: 24px; color: #a78bfa; }
    #chat-box {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .msg {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
    }
    .user { background: #4f46e5; align-self: flex-end; }
    .ai { background: #1e1e2e; align-self: flex-start; border: 1px solid #2e2e3e; }
    .input-area {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 640px;
    }
    textarea {
      flex: 1;
      padding: 12px;
      background: #1e1e2e;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      color: #ececec;
      font-size: 15px;
      resize: none;
      height: 52px;
    }
    button {
      padding: 0 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #6366f1; }
  </style>
</head>
<body>
  <h1>💬 AI 对话</h1>
  <div id="chat-box"></div>
  <div class="input-area">
    <textarea id="input" placeholder="输入你的问题..."></textarea>
    <button id="btn" onclick="sendMessage()">发送</button>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('input');
      const btn = document.getElementById('btn');
      const chatBox = document.getElementById('chat-box');
      const message = input.value.trim();
      if (!message) return;

      // 显示用户消息
      chatBox.innerHTML += `<div class="msg user">${message}</div>`;
      input.value = '';
      btn.disabled = true;

      // 显示加载状态
      const loadingId = 'loading-' + Date.now();
      chatBox.innerHTML += `<div class="msg ai" id="${loadingId}">思考中...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        document.getElementById(loadingId).textContent = data.reply || data.error;
      } catch (err) {
        document.getElementById(loadingId).textContent = '❌ 请求失败：' + err.message;
      }

      btn.disabled = false;
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
